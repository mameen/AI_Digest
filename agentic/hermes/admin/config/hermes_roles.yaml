# AI Digest Hermes profiles — consumed by agentic/hermes/admin/manage.py (setup).
# Role semantics: agentic/hermes/system_roles.md
# Profile names: orio_* (ORIO crew — Open Research Intelligence Observatory)
#
# --- Ollama switch (single location) ---
# Edit ``ollama:`` below, then:
#   python agentic/hermes/admin/manage.py setup
#   hermes gateway restart

ollama:
  provider: custom
  base_url: http://192.168.1.20:11434/v1
  default_model: qwen3.6:35b
  context_length: 262144

toolsets:
  - hermes-cli
  - kanban

# Concierge: orchestration + board status (no web fetch).
concierge_toolsets:
  - file
  - kanban
  - digest_admin

researcher_toolsets:
  - file
  - web
  - kanban_worker
  - digest
  - terminal

synthesizer_toolsets:
  - file
  - kanban_worker
  - digest

demo_goal:
  max_turns: 50

roles:
  - name: orio_concierge
    description: >-
      Concierge (orio_concierge). Single point of contact — standing topic list,
      schedule, GO vs add-topic. Assembles kanban; reports flow status via
      digest_board_status. Never fetches sources or writes stories.

  - name: orio_researcher
    description: >-
      Researcher — parallel worker, one target per kanban task. Fetches pages,
      extracts facts, returns structured notes with URLs. Does not merge across
      topics or write the digest.

  - name: orio_librarian
    description: >-
      Librarian — fan-in after all researchers. Dedupes, classifies, regroups
      categories, maps knowledge graph onto standing topics. Outputs curated
      skeleton — not final prose.

  - name: orio_synthesizer
    description: >-
      Synthesizer — composes finished briefing JSON from librarian graph.
      Executive takeaway, daily summary, category narratives. Does not re-fetch;
      grounding runs downstream.

agentic_enrich:
  enabled: false
  model: qwen3.6:35b

demo_topics:
  - aisearch
  - leaderboard
  - youtube

demo_prompt: >-
  Create one kanban research task per demo topic assigned to orio_researcher;
  one librarian task (orio_librarian) waiting on all research tasks;
  one synthesizer task (orio_synthesizer) waiting only on the librarian.
