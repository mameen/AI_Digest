# AI Digest Hermes profiles — consumed by agentic/hermes/admin/manage.py (setup).
# Role semantics: agentic/hermes/system_roles.md
# Profile names: orio_* (ORIO crew — Open Research Intelligence Observatory)
#
# --- Ollama switch (single location) ---
# Edit ``ollama:`` below, then:
#   python agentic/hermes/admin/manage.py setup
#   hermes gateway restart

ollama:
  provider: custom
  base_url: http://192.168.1.20:11434/v1
  default_model: qwen3.6:35b
  context_length: 262144

toolsets:
  - hermes-cli
  - kanban

# Concierge: orchestration + board status (no web fetch).
concierge_toolsets:
  - file
  - kanban
  - digest_admin

researcher_toolsets:
  - file
  - web
  - kanban_worker
  - digest
  - terminal

synthesizer_toolsets:
  - file
  - kanban_worker
  - digest

demo_goal:
  max_turns: 50

# Board topics: omit or `auto` → best known-good report (most stories). Pin for eval:
# demo_topics: [evaluation_test_topic]
demo_topics: auto

roles:
  - name: orio_concierge
    description: >-
      Concierge — single point of contact and ORIO control plane. Standing topic
      list, schedule, GO vs add-topic, board status, open report, assess,
      deploy, publish (push only after approval). Assembles kanban — never
      fetches sources or writes stories.

  - name: orio_researcher
    description: >-
      Researcher — parallel worker, one target per kanban task. Fetches pages,
      extracts facts, structured notes with verified URLs. Reflects and grounds
      its own output.md; downstream roles trust that work. Does not merge
      across topics or write the digest.

  - name: orio_librarian
    description: >-
      Librarian — fan-in after all researchers finish. Resolves overlap; maps
      every article and data point to standing topics; dedupes and regroups into
      librarian.md + knowledge graph. Synthesizer must not redo this work.
      Does not fetch URLs or write final publishable prose.

  - name: orio_synthesizer
    description: >-
      Synthesizer — reads librarian.md only (overlap and topics already settled).
      Format, schema, and writing: takeaway, summary, narratives → digest.json.
      Does not resolve overlap, remap topics, re-fetch, or read raw researcher
      artifacts. Grounding · validate · render run downstream — not this role.

agentic_enrich:
  enabled: false
  model: qwen3.6:35b

demo_prompt: >-
  Create one kanban research task per demo topic assigned to orio_researcher;
  one librarian task (orio_librarian) waiting on all research tasks;
  one synthesizer task (orio_synthesizer) waiting only on the librarian.
