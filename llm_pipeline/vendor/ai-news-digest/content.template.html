<div class="masthead">
  <div class="masthead-top">
    <h1>AI Daily</h1>
    <span class="report-source-seal" id="report-source-seal" hidden title="" aria-label="Report source"></span>
    <span class="masthead-date" id="digest-date"></span>
    <span class="masthead-archive"><a href="index.html#__PREFIX__">← Archive</a></span>

  <div class="masthead-summary" id="digest-summary"></div>

<div class="top-stories-bar" id="top-stories-bar">

</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">By Category</div>
      <svg id="donut-chart" width="208" height="160"></svg>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Significance</div>
      <svg id="sig-chart" width="208" height="100"></svg>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">Top Tags</div>
      <div class="tag-cloud" id="tag-cloud"></div>
    </div>
  </aside>
  <div class="layout-resizer" id="layout-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" tabindex="0"></div>

    <div class="filter-bar" id="filter-bar"></div>

</div>

<footer class="footer">

</footer>

<div class="d3-tooltip" id="tooltip"></div>

<script>window.__AIDIGEST_DIGEST__ = __DIGEST_JSON__;</script>
<script>
const PAGE_PREFIX = "__PREFIX__";
let digestData = null;
const leaderboards = __LEADERBOARDS__;

__DIGEST_APP__

function loadDigest() {
  digestData = window.__AIDIGEST_DIGEST__;
  if (!digestData) {
    throw new Error('Could not load ' + PAGE_PREFIX + '.json (expected sibling of this page)');
  }
  document.title = 'AI Daily | ' + (digestData.generated_at || PAGE_PREFIX).slice(0, 10);
  render(digestData);
}

try {
  loadDigest();
} catch (err) {
  document.getElementById('story-grid').innerHTML =
    '<div class="empty-state">Failed to load digest: ' + err.message + '</div>';
}
</script>
